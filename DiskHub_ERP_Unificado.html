<!doctype html>
<html lang="pt-BR" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiskHub - Business Cloud ERP & CRM</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Limitless CSS Assets -->
    <link href="./limitless_assets/css/ltr/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="./limitless_assets/css/ltr/bootstrap_limitless.min.css" rel="stylesheet" type="text/css">
    <link href="./limitless_assets/css/ltr/layout.min.css" rel="stylesheet" type="text/css">
    <link href="./limitless_assets/css/ltr/components.min.css" rel="stylesheet" type="text/css">
    <link href="./limitless_assets/css/ltr/all.min.css" rel="stylesheet" type="text/css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f5f7fb;
            --border-color: #e2e8f0;
            --th-bg: #f5f7fb;
            --text-sec: #64748b;
            --row-striped: rgba(241, 245, 249, 0.4);
            --row-hover: rgba(241, 245, 249, 0.8);
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.03), 0 2px 4px -2px rgb(0 0 0 / 0.03);
            --card-hover-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
            --scrollbar-track: #f1f5f9;
            --scrollbar-thumb: #cbd5e1;
            --scrollbar-thumb-hover: #94a3b8;
        }

        .dark {
            --bg-main: #090d16;
            --border-color: rgba(255, 255, 255, 0.06);
            --th-bg: #0d111d;
            --text-sec: #94a3b8;
            --row-striped: rgba(255, 255, 255, 0.01);
            --row-hover: rgba(255, 255, 255, 0.02);
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.2), 0 2px 4px -2px rgb(0 0 0 / 0.2);
            --card-hover-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.4), 0 8px 10px -6px rgb(0 0 0 / 0.4);
            --scrollbar-track: #090d16;
            --scrollbar-thumb: #1e293b;
            --scrollbar-thumb-hover: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            transition: background-color 0.25s ease;
        }

        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        /* Modern Table styling overrides */
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 0;
            background: transparent !important;
        }
        .table th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 0.05em;
            padding: 0.75rem 1rem !important;
            border-bottom: 1px solid var(--border-color) !important;
            background: var(--th-bg) !important;
            color: var(--text-sec) !important;
        }
        .table td {
            padding: 0.85rem 1rem !important;
            border-bottom: 1px solid var(--border-color) !important;
            vertical-align: middle;
        }
        .table-striped tbody tr:nth-of-type(odd) {
            background-color: var(--row-striped) !important;
        }
        .table-hover tbody tr:hover {
            background-color: var(--row-hover) !important;
        }

        /* Premium Transitions */
        .card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important;
            box-shadow: var(--card-shadow) !important;
            border-radius: 18px !important;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-hover-shadow) !important;
        }

        /* Input overrides */
        .form-control {
            border-radius: 8px !important;
            transition: all 0.15s ease-in-out !important;
        }
        .form-control:focus {
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15) !important;
            border-color: #3b82f6 !important;
        }

        /* Active animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
